apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kubecost-infrastructure
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://github.com/Ghostbusters-ace/micro-trips-gitops.git
    targetRevision: main
    path: manifests/infrastructure/kubecost
    kustomize:
      buildOptions: "--enable-helm"
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: kubecost
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true