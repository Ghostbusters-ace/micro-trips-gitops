apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: security-config
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://github.com/Ghostbusters-ace/micro-trips-gitops.git
    targetRevision: main
    path: manifests/infrastructure/security
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true