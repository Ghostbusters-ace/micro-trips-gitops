apiVersion: batch/v1
kind: Job
metadata:
  name: vault-auto-init
  namespace: vault
spec:
  template:
    spec:
      serviceAccountName: vault
      restartPolicy: OnFailure
      containers:
      - name: init-vault
        image: hashicorp/vault:1.17.2
        env:
        - name: VAULT_ADDR
          value: "http://vault.vault.svc.cluster.local:8200"
        command: ["/bin/sh", "-c"]
        args:
          - |
            # 1. Attente que le service Vault réponde sur son API de santé
            until wget --spider -q "$VAULT_ADDR/v1/sys/health" || [ $? -eq 2 ]; do 
              echo "En attente du démarrage du Pod Vault..."
              sleep 2
            done
            
            # 2. Initialisation de Vault s'il est vierge
            if ! vault operator init -status >/dev/null 2>&1; then
              echo "Vault non initialisé. Initialisation en cours..."
              vault operator init -key-shares=1 -key-threshold=1 -format=json > /tmp/keys.json
              
              # Sauvegarde des clés dans un Secret Kubernetes pour survivre aux redémarrages de pods
              kubectl create secret generic vault-prod-keys --from-file=keys.json=/tmp/keys.json -n vault --dry-run=client -o yaml | kubectl apply -f -
            fi
            
            # 3. Récupération de la clé d'unseal et déverrouillage (Unseal)
            UNSEAL_KEY=$(kubectl get secret vault-prod-keys -n vault -o jsonpath='{.data.keys\.json}' | base64 -d | grep -o '"unseal_keys_b64":\["[^"]*"\]' | sed 's/.*\["\(.*\)"\].*/\1/')
            vault operator unseal "$UNSEAL_KEY"
            
            # 4. Configuration de l'authentification native Kubernetes
            ROOT_TOKEN=$(kubectl get secret vault-prod-keys -n vault -o jsonpath='{.data.keys\.json}' | base64 -d | grep -o '"root_token":"[^"]*"' | cut -d'"' -f4)
            export VAULT_TOKEN="$ROOT_TOKEN"
            
            if ! vault auth list 2>/dev/null | grep -q "kubernetes/"; then
              echo "Configuration de la méthode d'authentification Kubernetes (DevSecOps)..."
              vault auth enable kubernetes
              
              # On pointe vers l'API Server interne du cluster K8s
              vault write auth/kubernetes/config kubernetes_host="https://kubernetes.default.svc.cluster.local:443"
              
              # Création de la politique d'accès en lecture seule pour External Secrets
              echo 'path "secret/data/*" { capabilities = ["read"] } path "secret/metadata/*" { capabilities = ["read"] }' | vault policy write es-policy -
              
              # Création du rôle lié au ServiceAccount d'External Secrets (ESO)
              vault write auth/kubernetes/role/external-secrets-role \
                bound_service_account_names=external-secrets \
                bound_service_account_namespaces=external-secrets \
                policies=es-policy \
                ttl=24h
            fi
            echo "Vault est maintenant Unsealed et configuré pour l'authentification Kubernetes !"