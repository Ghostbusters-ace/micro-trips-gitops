apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: micro-trips
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
      - name: worker
        image: ghcr.io/ghostbusters-ace/worker:latest