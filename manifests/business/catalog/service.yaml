apiVersion: v1
kind: Service
metadata:
  name: catalog
  namespace: micro-trips
spec:
  selector:
    app: catalog
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080

---
# Service pointant vers la version stable (v1)
apiVersion: v1
kind: Service
metadata:
  name: catalog-stable
  namespace: micro-trips
spec:
  selector:
    app: catalog
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080

---
# Service pointant vers la nouvelle version en test (v2)
apiVersion: v1
kind: Service
metadata:
  name: catalog-canary
  namespace: micro-trips
spec:
  selector:
    app: catalog
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080