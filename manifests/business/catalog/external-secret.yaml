apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: catalog-db-secret
  namespace: micro-trips
spec:
  refreshInterval: 30s
  secretStoreRef: 
    name: vault-backend
    kind: ClusterSecretStore
  target: 
    name: catalog-db-secret
  data:
  - secretKey: POSTGRES_USER
    remoteRef: 
      key: postgres
      property: POSTGRES_USER
  - secretKey: POSTGRES_PASSWORD
    remoteRef: 
      key: postgres
      property: POSTGRES_PASSWORD