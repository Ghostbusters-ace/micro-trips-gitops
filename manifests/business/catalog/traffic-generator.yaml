---
apiVersion: v1
kind: ConfigMap
metadata:
  name: k6-catalog-loadtest-script
  namespace: micro-trips
data:
  loadtest.js: |
    import http from 'k6/http';
    import { sleep, check } from 'k6';

    export const options = {
        vus: 2,           
        duration: '15m',  // Tourne 15 minutes
    };

    export default function () {

        const url = 'http://catalog-canary:8080/api/v1/trips';
        
        const res = http.get(url);
        
        check(res, {
            'status est 200 (OK)': (r) => r.status === 200,
        });
        
        // Pause de 2 secondes pour ne pas surcharger ton ordi et ta base de données
        sleep(2); 
    }

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: k6-catalog-traffic-generator
  namespace: micro-trips
spec:
  replicas: 1
  selector:
    matchLabels:
      app: k6-catalog-generator
  template:
    metadata:
      labels:
        app: k6-catalog-generator
    spec:
      containers:
      - name: k6
        image: grafana/k6:latest
        command: ["k6", "run", "/scripts/loadtest.js"]
        volumeMounts:
        - name: script-volume
          mountPath: /scripts
      volumes:
      - name: script-volume
        configMap:
          name: k6-catalog-loadtest-script