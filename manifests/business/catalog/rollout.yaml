apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: catalog
  namespace: micro-trips
spec:
  replicas: 4
  selector:
    matchLabels:
      app: catalog
  strategy:
    canary:
      stableService: catalog-stable
      canaryService: catalog-canary
      steps:
        - setWeight: 20
        - pause: { duration: 1m }
        - analysis:
            templates:
              - templateName: catalog-success-rate
            args:
              - name: version-name
                value: "canary"
        - setWeight: 40
        - pause: { duration: 1m }
        - analysis:
            templates:
              - templateName: catalog-success-rate
            args:
              - name: version-name
                value: "canary"
        - setWeight: 80
        - pause: {}
  template:
    metadata:
      labels:
        app: catalog
    spec:
      containers:
      - name: catalog
        image: ghcr.io/ghostbusters-ace/catalog:latest
        ports:
        - containerPort: 8080
        resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"