apiVersion: apps/v1
kind: Deployment
metadata:
  name: booking
  namespace: micro-trips
spec:
  replicas: 1
  selector:
    matchLabels:
      app: booking
  template:
    metadata:
      labels:
        app: booking
    spec:
      containers:
      - name: booking
        image: ghcr.io/ghostbusters-ace/booking:latest
        ports:
        - containerPort: 8081