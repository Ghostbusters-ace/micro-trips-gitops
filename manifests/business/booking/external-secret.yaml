---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: booking-db-secret
  namespace: micro-trips
spec:
  refreshInterval: 30s
  secretStoreRef: 
    name: vault-backend
    kind: ClusterSecretStore
  target: 
    name: booking-db-secret
  data:
  - secretKey: POSTGRES_USER
    remoteRef: 
      key: postgres
      property: POSTGRES_USER
  - secretKey: POSTGRES_PASSWORD
    remoteRef: 
      key: postgres
      property: POSTGRES_PASSWORD

---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: rabbitmq-secret
  namespace: micro-trips
spec:
  refreshInterval: 30s
  secretStoreRef: 
    name: vault-backend
    kind: ClusterSecretStore
  target: 
    name: rabbitmq-secret
  data:
  - secretKey: RABBITMQ_DEFAULT_USER
    remoteRef: 
      key: rabbitmq
      property: RABBITMQ_DEFAULT_USER
  - secretKey: RABBITMQ_DEFAULT_PASS
    remoteRef: 
      key: rabbitmq
      property: RABBITMQ_DEFAULT_PASS