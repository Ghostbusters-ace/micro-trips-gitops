apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: argo-rollouts

resources:
  - namespace.yaml

helmCharts:
  - name: argo-rollouts
    repo: https://argoproj.github.io/argo-helm
    version: 2.41.0
    releaseName: argo-rollouts
    namespace: argo-rollouts
    valuesInline:
      dashboard:
        enabled: true # Active le tableau de bord visuel d'Argo Rollouts