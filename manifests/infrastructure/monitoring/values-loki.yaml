deploymentMode: SingleBinary

loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  schemaConfig:
    configs:
      - from: "2026-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: index_
          period: 24h
  storage:
    type: 'filesystem'

singleBinary:
  replicas: 1

# On désactive les composants de la version distribuée
read:
  replicas: 0
write:
  replicas: 0
backend:
  replicas: 0