apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: kubecost-token
  namespace: kubecost
spec:
  refreshInterval: 1h
  secretStoreRef: 
    name: vault-backend
    kind: ClusterSecretStore
  target: 
    name: kubecost-token
  data:
  - secretKey: token 
    remoteRef: 
      key: kubecost
      property: token